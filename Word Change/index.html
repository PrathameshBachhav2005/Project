<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word | Change</title>
    <link rel="stylesheet" href="style.css">
</head>

<body id="body">
    <main>
        <div class="container">
            <h1> Word Change </h1>

            <div class="commentbox">
                <textarea name="id1" id="id1" rows="15" cols="40">Hello Sir</textarea>
            </div>
            <button class="b1" onclick="changeText()">
                Change Text
            </button>
            <button class="b2" onclick="changeUpper()">
                Upper
            </button>
            <button class="b3" onclick="changeLower()">
                Lower
            </button>
            <button class="b4" onclick="changeBG()">
                Background-Color
            </button>
            <button class="b5" onclick="lock()">
                Clear
            </button>
            <button class="b6" onclick="fontSize(35)">
                FontSize
            </button>

        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
